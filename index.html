<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Formulário de almoço</title>
</head>
<body>
     <div class="container">
          <div class="logo">
               <img src="src/images/logo-500px.png" alt="Logo do IFBA - Campus Irecê">
          </div>
          <div class="navbar">
               <nav>
                    <a href="#" class=".active">Formulário</a>
                    <a href="#">Cardápio</a>
                    <a href="#">Relatar Erro</a>
                    <a href="#">Sobre</a>
               </nav>
               <div>
                    <a href="#">Login</a>
               </div>
          </div>
          <header>
               <h1>Formulário de almoço</h1>
               <p>Responda esse formulário para garantir seu almoço.</p>
          </header>
          <form action="">
               <div class="field name">
                    <label for="iname" class="form-label">Nome Completo:</label>
                    <input type="text" id="iname" placeholder="Digite seu nome completo" required>
               </div>
               <div class="field">
                    <label for="iemail" class="form-label">E-mail:</label>
                    <input type="email" id="iemail" placeholder="Digite seu e-mail" required>
               </div>
               <div class="field">
                    <label for="imat" class="form-label">Matrícula:</label>
                    <input type="text" id="imat" placeholder="Digite sua matrícula">
               </div>
               <div class="field turmas">
                    <label for="turmas" class="form-label">Turma:</label>
                    <div class="input-area">
                         <input list="list_turmas" name="turmas" autocomplete="off" placeholder="Selecione a sua turma">
                         <i class="icon fa-solid fa-magnifying-glass"></i>
                    </div>
                    <datalist id="list_turmas">
                         <option value="1° ano - Biocombustivéis - Matutino"></option>
                         <option value="1° ano - Biocombustivéis - Vespertino"></option>
                         <option value="2° ano - Biocombustivéis - Matutino"></option>
                         <option value="2° ano - Biocombustivéis - Vespertino"></option>
                         <option value="3° ano - Biocombustivéis - Matutino"></option>
                         <option value="3° ano - Biocombustivéis - Vespertino"></option>
                         <option value="4° ano - Biocombustivéis - Matutino"></option>
                         <option value="4° ano - Biocombustivéis - Vespertino"></option>
                         <option value="1° ano - Eletromecânica - Matutino"></option>
                         <option value="1° ano - Eletromecânica - Vespertino"></option>
                         <option value="2° ano - Eletromecânica - Matutino"></option>
                         <option value="2° ano - Eletromecânica - Vespertino"></option>
                         <option value="3° ano - Eletromecânica - Matutino"></option>
                         <option value="3° ano - Eletromecânica - Vespertino"></option>
                         <option value="4° ano - Eletromecânica - Matutino"></option>
                         <option value="4° ano - Eletromecânica - Vespertino"></option>
                         <option value="1° ano - Informática - Matutino"></option>
                         <option value="1° ano - Informática - Vespertino"></option>
                         <option value="2° ano - Informática - Matutino"></option>
                         <option value="2° ano - Informática - Vespertino"></option>
                         <option value="3° ano - Informática - Matutino"></option>
                         <option value="3° ano - Informática - Vespertino"></option>
                         <option value="4° ano - Informática - Matutino"></option>
                         <option value="4° ano - Informática - Vespertino"></option>
                    </datalist>
               </div>
               <div class="field justificativa">
                    <h2 class="form-label">Justificativa de Permanência:</h2>
                    <label for="contraturno">
                         <input type="radio" name="justificativa" id="contraturno">
                         Contraturno
                    </label>
                    <label for="transporte">
                         <input type="radio" name="justificativa" id="transporte">
                         Transporte
                    </label>
                    <label for="outro">
                         <input type="radio" name="justificativa" id="outro">
                         Outro
                    </label> 
               </div>
               <div class="field date">
                    <label for="idata" class="form-label">Data:</label>
                    <input type="date" name="" id="idata">
               </div>
               <input type="submit" value="Confirmar">
          </form>
          <footer>
               <p>@ 2026 | Instituto Federal de Educação, Ciência e Tecnologia da Bahia (IFBA) - Campus Irecê</p>
          </footer>
     </div>
</body>
</html>
